<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Trek - Voice Treasures</title>
  <style>
    body { font-family: system-ui; background: #000; color: gold; text-align: center; padding: 40px; }
    button { background: #111; color: gold; padding: 15px 30px; border: 3px solid gold; border-radius: 50px; font-size: 18px; cursor: pointer; }
    #voice { margin: 30px auto; width: 90%; max-width: 400px; background: #111; padding: 20px; border-radius: 15px; display: none; }
  </style>
</head>
<body>
  <h1>🏴‍☠️ Tesla Trek</h1>
  <p>Live Voice Pirate Guide + Fortune Cookie NFT Hunts</p>
  
  <button onclick="toggleVoice()">🦜 Talk to TrekGuide</button>
  
  <div id="voice">
    <p>Paste your TrekGuide embed code here later.</p>
  </div>

  <script>
    function toggleVoice() {
      const panel = document.getElementById('voice');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }
  </script>
</body>
</html>
