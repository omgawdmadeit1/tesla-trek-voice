<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Trek - Fortune Cookie Hunts</title>
  <style>
    body { font-family: system-ui; background: #000; color: gold; text-align: center; padding: 40px; margin: 0; }
    h1 { font-size: 2.5em; }
    button { background: #111; color: gold; padding: 15px 30px; border: 3px solid gold; border-radius: 50px; font-size: 18px; cursor: pointer; margin: 10px; }
    #voice { margin: 30px auto; width: 90%; max-width: 600px; background: #111; padding: 20px; border-radius: 15px; border: 3px solid gold; display: none; min-height: 400px; }
  </style>
</head>
<body>
  <h1>🏴‍☠️ Tesla Trek - Fortune Cookie Hunts</h1>
  <p>Real Tesla + XYO + Live Pirate Voice Guide</p>
  
  <button onclick="toggleVoice()">🦜 Talk to TrekGuide</button>
  <button onclick="window.location.reload()">Refresh Hunt</button>
  
  <div id="voice">
    <p>TrekGuide is ready — speak or type below.</p>
    <!-- Replace this iframe src with your actual TrekGuide embed link from xAI -->
    <iframe src="https://console.x.ai" style="width:100%; height:420px; border:none;" title="TrekGuide"></iframe>
  </div>

  <script>
    function toggleVoice() {
      const panel = document.getElementById('voice');
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }
  </script>
</body>
</html>
